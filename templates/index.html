<!DOCTYPE html>
<html>
<head>
    <title>S2S Manual</title>
    <style>
        body {
            background: #0d0d1a;
            color: #c0bedd;
            font-family: Courier;
            padding: 20px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            background: #1a1a2e;
            border: none;
            color: #fff;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            background: #1c1c30;
            color: #c0bedd;
            border: none;
            cursor: pointer;
        }

        #log {
            margin-top: 10px;
            height: 250px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<h2>S2S Manual</h2>

<input id="app_token" placeholder="App Token">
<input id="event_token" placeholder="Event Token">
<input id="device_id" placeholder="GPS ADID / IDFA">

<label><input type="checkbox" id="ios" checked> iOS Device</label>
<label><input type="checkbox" id="s2s"> s2s=1</label>

<button onclick="sendNow()">Credit Event (now)</button>

<div id="log"></div>

<script>
function log(msg) {
    const logBox = document.getElementById("log");
    const time = new Date().toLocaleTimeString();
    logBox.innerHTML += `[${time}] ${msg}<br>`;
    logBox.scrollTop = logBox.scrollHeight;
}

async function sendNow() {
    const res = await fetch("/send-now", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            app_token: document.getElementById("app_token").value,
            event_token: document.getElementById("event_token").value,
            device_id: document.getElementById("device_id").value,
            is_ios: document.getElementById("ios").checked,
            use_s2s: document.getElementById("s2s").checked
        })
    });

    const data = await res.json();

    if (data.error) {
        log("ERROR: " + data.error);
    } else {
        log(data.status === 200 ? "Success" : data.response);
    }
}
</script>

</body>
</html>
